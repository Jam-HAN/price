<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>대박통신 단가표 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f5f7fb;
    --panel: #ffffff;
    --ink: #0b1020;
    --ink-2: #3b4358;
    --ink-3: #7a8197;
    --line: #e7ebf3;
    --line-2: #f1f4fa;
    --blue: #2152ff;
    --blue-2: #133ed8;
    --blue-soft: #eaf0ff;
    --lime: #d4ff3f;
    --pink: #ff5fae;
    --yellow: #ffd84a;
    --mint: #3fe0b0;
    --red: #ff4d4f;
    --ok: #10b981;
    --net: #0b1020;
    --customer: #2152ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  button { font-family: inherit; cursor: pointer; border: none; background: transparent; color: inherit; }
  input, select, textarea { font-family: inherit; }
  .num { font-variant-numeric: tabular-nums; }

  /* Layout */
  #root { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }
  .sidebar { background: #0b1020; color: #e6e9f2; padding: 22px 16px; position: sticky; top: 0; height: 100vh; display:flex; flex-direction:column; }
  .brand { display:flex; align-items:center; gap: 10px; padding: 6px 8px 22px; }
  .brand .logo { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, #2152ff, #7a9bff 60%, #d4ff3f); display:grid; place-items:center; font-weight:800; color:#fff; font-size: 16px; }
  .brand .name { font-weight: 800; letter-spacing: -0.01em; }
  .brand .sub { font-size: 11px; color:#8a93ad; margin-top: 2px; letter-spacing: 0.02em; }

  .nav { display:flex; flex-direction: column; gap: 2px; }
  .nav-section { color:#6b7391; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; padding: 14px 10px 6px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding: 9px 10px; border-radius: 9px; color:#c8cee1; font-size: 14px; font-weight: 500; }
  .nav-item:hover { background: #141a33; color:#fff; }
  .nav-item.active { background: #2152ff; color: #fff; }
  .nav-item .icon { width: 18px; height: 18px; display:inline-flex; }
  .nav-item .badge { margin-left:auto; background: var(--lime); color:#0b1020; font-size: 10px; padding: 2px 6px; border-radius: 99px; font-weight: 700; }

  .sidebar-foot { margin-top:auto; border-top: 1px solid #1b2142; padding-top: 14px; }
  .user-chip { display:flex; align-items:center; gap:10px; padding: 6px; border-radius: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #ff5fae, #ffd84a); display:grid; place-items:center; color:#0b1020; font-weight: 800; }
  .user-chip .meta { line-height: 1.1; }
  .user-chip .meta .n { font-size: 13px; font-weight: 600; color: #fff; }
  .user-chip .meta .r { font-size: 11px; color: #8a93ad; margin-top: 2px; }

  /* Main */
  main { padding: 22px 28px 80px; max-width: 1208px; }
  header.page { display:flex; align-items:flex-end; justify-content: space-between; margin-bottom: 18px; }
  header.page h1 { font-size: 26px; letter-spacing: -0.02em; margin: 0; font-weight: 800; }
  header.page .crumbs { font-size: 12px; color: var(--ink-3); margin-bottom: 6px; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding: 9px 14px; border-radius: 10px; font-weight: 600; font-size: 13px; border:1px solid transparent; transition: all .15s ease; }
  .btn.primary { background: var(--blue); color:#fff; }
  .btn.primary:hover { background: var(--blue-2); }
  .btn.ghost { background:#fff; color: var(--ink); border-color: var(--line); }
  .btn.ghost:hover { background: var(--bg); }
  .btn.dark { background: #0b1020; color: #fff; }
  .btn.lime { background: var(--lime); color:#0b1020; }
  .btn.sm { padding: 6px 10px; font-size: 12px; border-radius: 8px; }

  .card { background: var(--panel); border-radius: 16px; border: 1px solid var(--line); }
  .card-h { padding: 16px 20px; border-bottom: 1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .card-h h3 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .card-b { padding: 18px 20px; }

  .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  .stat { background:#fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px; position: relative; overflow: hidden; }
  .stat .label { font-size: 12px; color: var(--ink-3); font-weight: 600; }
  .stat .value { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; margin-top: 6px; }
  .stat .delta { font-size: 12px; color: var(--ok); font-weight: 600; margin-top: 4px; display:inline-flex; align-items:center; gap: 4px; }
  .stat .delta.down { color: var(--red); }
  .stat .spark { position:absolute; right: 14px; top: 14px; opacity:.6; }
  .stat .pill { position:absolute; top:14px; right:14px; font-size: 10px; padding: 3px 7px; border-radius: 99px; background: var(--blue-soft); color: var(--blue-2); font-weight:700; }

  .chip { display:inline-flex; align-items:center; gap:6px; padding: 4px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; background: #f1f4fa; color: var(--ink-2); border: 1px solid var(--line); }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); }
  .chip.blue { background: var(--blue-soft); color: var(--blue-2); border-color: #d7e1ff; } .chip.blue .dot{background:var(--blue);}
  .chip.lime { background: #f4ffc7; color: #4f5d07; border-color: #e8f79a; } .chip.lime .dot{background:#8aa40d;}
  .chip.pink { background: #ffeaf4; color: #b8246e; border-color: #ffc7e0; } .chip.pink .dot{background:var(--pink);}
  .chip.mint { background: #ddfbf1; color: #067c5c; border-color: #bdf4e3; } .chip.mint .dot{background:var(--mint);}
  .chip.yellow{ background: #fff7d0; color: #7a5a00; border-color: #ffe78b; } .chip.yellow .dot{background:#e7a700;}
  .chip.ink { background: #0b1020; color: #fff; border-color:#0b1020; } .chip.ink .dot{background:var(--lime);}

  table.t { width: 100%; border-collapse: separate; border-spacing: 0; }
  table.t th, table.t td { text-align: left; padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--line-2); }
  table.t th { font-weight: 600; color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; background: #fafbff; border-bottom: 1px solid var(--line); }
  table.t tr:hover td { background: #fafbff; }
  table.t td.num { font-variant-numeric: tabular-nums; }
  table.t .right { text-align: right; }

  .input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); background: #fff; font-size: 14px; color: var(--ink); outline: none; transition: border-color .12s; }
  .input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(33, 82, 255, 0.12); }
  .label { font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; display:block; }
  .help { font-size: 11px; color: var(--ink-3); margin-top: 4px; }

  /* Dropzone */
  .dz { border: 2px dashed #c7d0e3; background: #f7f9ff; border-radius: 16px; padding: 36px 24px; text-align:center; transition: all .15s ease; cursor: pointer; }
  .dz:hover, .dz.drag { border-color: var(--blue); background: #eaf0ff; }
  .dz .ic { width: 56px; height: 56px; border-radius: 16px; background: #fff; border: 1px solid var(--line); display:grid; place-items:center; margin: 0 auto 12px; }

  /* Segmented */
  .seg { display:inline-flex; background: #f1f4fa; padding: 3px; border-radius: 10px; border: 1px solid var(--line); }
  .seg button { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--ink-3); }
  .seg button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 2px rgba(11,16,32,0.08); }

  /* Carrier pills */
  .carrier { display:inline-flex; align-items:center; gap: 6px; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
  .carrier.A { background: #ffeef0; color: #d71f30; }
  .carrier.B { background: #fff3da; color: #a36a00; }
  .carrier.C { background: #e8f4ff; color: #0a59c7; }

  /* Steps */
  .steps { display:flex; align-items:center; gap: 0; }
  .step { display:flex; align-items:center; gap:10px; padding: 10px 14px; font-size: 13px; color: var(--ink-3); font-weight: 600; border-radius: 12px; }
  .step .n { width: 22px; height: 22px; border-radius: 50%; background: #e7ebf3; display:grid; place-items:center; font-size: 12px; }
  .step.on { color: var(--ink); }
  .step.on .n { background: var(--blue); color: #fff; }
  .step.done .n { background: var(--ok); color: #fff; }
  .step .sep { color: var(--line); margin: 0 4px; }

  /* Upload preview */
  .shot { border-radius: 12px; overflow: hidden; border: 1px solid var(--line); background: #fff; position: relative; }
  .shot .tag { position:absolute; top: 10px; left: 10px; font-size: 10px; background: rgba(11,16,32,0.8); color:#fff; padding: 3px 7px; border-radius: 99px; font-weight: 700; }
  .rebate-svg { display:block; width:100%; height:auto; }

  /* Editable table */
  .edit-t { width: 100%; border-collapse: collapse; font-size: 13px; }
  .edit-t th { background: #f5f7fb; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); padding: 10px 8px; text-align: right; font-weight: 700; border-bottom: 1px solid var(--line); position: sticky; top: 0; }
  .edit-t th.left, .edit-t td.left { text-align: left; }
  .edit-t td { padding: 6px 8px; border-bottom: 1px solid var(--line-2); text-align: right; font-variant-numeric: tabular-nums; }
  .edit-t td .cell { width: 100%; padding: 6px 8px; border: 1px solid transparent; border-radius: 6px; background: transparent; font-size: 13px; font-family: 'JetBrains Mono', monospace; text-align: right; color: var(--ink); }
  .edit-t td .cell:focus { border-color: var(--blue); background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(33,82,255,0.1); }
  .edit-t td.highlight { background: #f4ffc7; font-weight: 700; }
  .edit-t tr.section td { background: #f5f7fb; font-weight: 700; color: var(--ink); text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 10px; }

  /* Pricesheet output */
  .sheet { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 10px 40px -20px rgba(11,16,32,0.2); border: 1px solid var(--line); }
  .sheet.net .sheet-hd { background: linear-gradient(135deg, #0b1020, #1c2452); color: #fff; }
  .sheet.cust .sheet-hd { background: linear-gradient(135deg, #2152ff, #7a9bff); color: #fff; }
  .sheet-hd { padding: 22px 26px; display:flex; align-items:flex-end; justify-content: space-between; }
  .sheet-hd .title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .sheet-hd .sub { opacity: 0.75; font-size: 12px; margin-top: 4px; }
  .sheet-hd .stamp { text-align: right; font-size: 11px; opacity: 0.8; }
  .sheet-bd { padding: 20px 26px 26px; }

  .ps-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ps-table th { background: #f5f7fb; color: var(--ink-2); font-weight: 700; padding: 10px 8px; text-align: right; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 2px solid var(--ink); }
  .ps-table th.left { text-align: left; }
  .ps-table td { padding: 8px; text-align: right; border-bottom: 1px solid var(--line-2); font-variant-numeric: tabular-nums; }
  .ps-table td.left { text-align: left; font-weight: 600; }
  .ps-table tr.group td { background: #0b1020; color: var(--lime); text-align: left; text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; font-weight: 800; padding: 6px 10px; }
  .ps-table.cust tr.group td { background: var(--blue); color: #fff; }
  .ps-table .acc { color: var(--red); font-weight: 700; }
  .ps-table .acc.pos { color: var(--ok); }

  /* Tooltip / Alert */
  .alert { padding: 12px 14px; border-radius: 12px; background: #fff7d0; border: 1px solid #ffe78b; color: #7a5a00; font-size: 12px; display:flex; gap:10px; align-items: flex-start; }
  .alert.info { background: var(--blue-soft); border-color: #d7e1ff; color: var(--blue-2); }
  .alert.ok { background: #ddfbf1; border-color: #bdf4e3; color: #067c5c; }

  /* Tweak panel */
  #tweaks { position: fixed; right: 20px; bottom: 20px; width: 280px; background: #0b1020; color: #fff; border-radius: 14px; padding: 14px; z-index: 200; box-shadow: 0 20px 60px -20px rgba(0,0,0,.4); display:none; }
  #tweaks.on { display: block; }
  #tweaks h4 { margin: 0 0 10px; font-size: 13px; }
  #tweaks .row { display:flex; align-items:center; justify-content:space-between; margin: 6px 0; font-size: 12px; }
  #tweaks input[type=range] { width: 140px; }
  #tweaks .swatches { display:flex; gap: 6px; }
  #tweaks .sw { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #1b2142; cursor: pointer; }
  #tweaks .sw.on { border-color: #fff; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(11,16,32,0.6); display:none; align-items:center; justify-content:center; z-index: 100; backdrop-filter: blur(4px); }
  .modal-bg.on { display:flex; }
  .modal { background: #fff; border-radius: 20px; width: 560px; max-width: 92vw; max-height: 88vh; overflow: hidden; display:flex; flex-direction:column; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d0d6e4; border-radius: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Hover card */
  .model-card { background:#fff; border:1px solid var(--line); border-radius: 14px; padding: 14px; transition: all .15s ease; cursor: pointer; position: relative; }
  .model-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 8px 24px -12px rgba(33,82,255,0.3); }
  .model-card.on { border-color: var(--blue); background: var(--blue-soft); }
  .model-card .img { height: 110px; border-radius: 10px; background: linear-gradient(135deg, #eef2ff, #dde6ff); display:grid; place-items:center; margin-bottom: 10px; position: relative; overflow:hidden; }
  .model-card .img .glyph { font-weight: 800; color: #0b1020; font-size: 14px; }
  .model-card .name { font-weight: 700; font-size: 14px; }
  .model-card .meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .model-card .stor { display:flex; gap:4px; margin-top: 8px; }
  .model-card .stor span { font-size: 10px; padding: 2px 6px; border-radius: 99px; background: #f1f4fa; color: var(--ink-2); }

  /* Sparkline */
  .bar { display:inline-block; background: var(--blue); border-radius: 2px; vertical-align: bottom; margin-right: 2px; }

  /* Empty image placeholder */
  .ph-img { background-image: repeating-linear-gradient(45deg, #eef2ff 0, #eef2ff 8px, #dde6ff 8px, #dde6ff 16px); }

  /* Print styles */
  @media print {
    .sidebar, header.page, .toolbar, #tweaks, .dock { display: none !important; }
    main { padding: 0; }
    body { background: #fff; }
  }

  .toolbar { display:flex; gap: 8px; align-items: center; }

  /* Status dot */
  .s-dot { display:inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--ok); margin-right: 6px; }
  .s-dot.warn { background: var(--yellow); }
  .s-dot.off { background: var(--ink-3); }

  /* Custom checkbox */
  .switch { position: relative; width: 36px; height: 20px; background: #d0d6e4; border-radius: 99px; cursor: pointer; transition: background .15s; }
  .switch.on { background: var(--blue); }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .15s; }
  .switch.on::after { transform: translateX(16px); }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0b1020; color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 300; display:flex; align-items:center; gap:10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .toast .ic { width: 20px; height: 20px; background: var(--lime); border-radius: 50%; display:grid; place-items:center; color:#0b1020; font-size: 12px; font-weight:800; }

  /* Loading animation */
  @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .spin { animation: spin 0.8s linear infinite; }
  .pulse { animation: pulse 1.2s ease-in-out infinite; }

  .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--blue), transparent); animation: scan 1.4s ease-in-out infinite; box-shadow: 0 0 12px var(--blue); }

  /* Badges */
  .badge-new { background: var(--lime); color: #0b1020; font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: 800; letter-spacing: 0.04em; }

</style>
</head>
<body>
<div id="root"></div>
<div id="toast-root"></div>
<div id="modal-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>

<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/models.jsx"></script>
<script type="text/babel" src="src/upload.jsx"></script>
<script type="text/babel" src="src/editor.jsx"></script>
<script type="text/babel" src="src/output.jsx"></script>
<script type="text/babel" src="src/history.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
